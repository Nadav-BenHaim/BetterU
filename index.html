<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterU Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="screen active">
        <div class="container">
            <h1 class="logo-text">Ambient Connect</h1>
            <p class="subtitle">Please authenticate to continue to the installation platform.</p>
            
            <button id="loginBtn" class="google-btn">
                <img src="https://docs.bytescale.com/images/social-integration/google-icon.svg" alt="Google Logo">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="dashboardScreen" class="screen">
        <div class="container">
            <h2>System Dashboard</h2>
            <p class="status-msg">Connection secure. Audio engine initialized.</p>
            
            <div class="menu-grid">
                <button id="triggerSoundBtn" class="action-btn">Trigger Node Audio</button>
                <button id="toSettingsBtn" class="nav-btn">System Settings</button>
            </div>
        </div>
    </div>

    <div id="settingsScreen" class="screen">
        <div class="container">
            <h2>System Settings</h2>
            <p class="status-msg">Adjust live environmental parameters.</p>
            
            <div class="control-panel">
                <label for="volumeSlider">Node Gain Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="80">
            </div>

            <button id="backToDashBtn" class="nav-btn secondary">Back to Dashboard</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
